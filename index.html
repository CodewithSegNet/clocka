<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Clocka - School Attendance Management System</title>
    <meta name="title" content="Clocka - School Attendance Management System" />
    <meta name="description" content="Modern school attendance tracking platform with real-time monitoring, parent portal, and comprehensive reporting." />
    <meta name="keywords" content="school attendance, student tracking, parent portal, education management, SaaS" />
    <meta name="author" content="Clocka" />
    
    <!-- Security Headers -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://vercel.live; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://vercel.live;" />

    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(self), camera=(self), microphone=()" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://clocka.app/" />
    <meta property="og:title" content="Clocka - School Attendance Management System" />
    <meta property="og:description" content="Modern school attendance tracking platform with real-time monitoring, parent portal, and comprehensive reporting." />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://clocka.app/" />
    <meta property="twitter:title" content="Clocka - School Attendance Management System" />
    <meta property="twitter:description" content="Modern school attendance tracking platform with real-time monitoring, parent portal, and comprehensive reporting." />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0039E6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Clocka" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect to external domains for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  </head>
  <body>
